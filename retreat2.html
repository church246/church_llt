<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026信義會靈糧堂牧養同工退修會</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Noto Sans TC',sans-serif;
    margin:0;
    background:#f5f7fa;
    color:#333;
}

.hero{
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1600");
    background-size:cover;
    color:white;
    text-align:center;
    padding:90px 20px;
}

.hero h1{font-size:2.8rem;}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

h2{
    border-left:5px solid #3498db;
    padding-left:10px;
    margin-bottom: 15px;
}

/* 輪播 */
.carousel img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:10px;
}

/* 表單 */
input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing: border-box;
}

button{
    margin-top:10px;
    padding:12px 24px;
    background:#198754;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size: 16px;
}

button:hover { background:#157347; }

/* 表格 */
table{
    width:100%;
    border-collapse:collapse;
    margin-top: 10px;
}

th{
    background:#0d6efd;
    color:white;
    padding:10px;
}

td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f9fa;
}

.loading-text {
    text-align: center;
    color: #666;
    font-style: italic;
}
</style>
</head>

<body>

<div class="hero">
    <h1>2026 信義會靈糧堂退修會</h1>
    <p>學像耶穌．突破</p>
</div>

<div class="container">

<div class="card">
<h2>活動照片</h2>
<div class="carousel">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1600">
</div>
</div>

<div class="card">
<h2>邀請信</h2>
<p>
親愛的牧養同工、弟兄姊妹：<br><br>
本次退修會以「學像耶穌．突破」為主題，透過福音與工人、團隊、工具三大方向，幫助我們重新得力，在主裡更新與合一。
</p>
</div>

<div class="card">
<h2>線上報名</h2>

<form action="https://docs.google.com/forms/d/e/1FAIpQLScGNLswZXO0N3GXvqfG6Z_HcbWiDma3FOu1vHS2oUStDtPazw/formResponse"
method="POST"
target="hidden_iframe"
id="registrationForm">

<input name="entry.1993706249" placeholder="姓名" required>

<select name="entry.305837101">
    <option value="自行前往">自行前往</option>
    <option value="需要接送">需要接送</option>
</select>

<select name="entry.1536849256">
    <option value="不開車/不適用">不開車</option>
    <option value="可載人">可載人</option>
    <option value="無空位">無空位</option>
</select>

<input name="entry.1915361258" placeholder="可載幾人（沒有填0）">

<textarea name="entry.463977651" placeholder="家眷名字"></textarea>

<select name="entry.1783599725">
    <option value="4人房">4人房</option>
    <option value="3人房">3人房</option>
    <option value="2人房">2人房</option>
</select>

<button type="submit">送出報名</button>
</form>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
</div>

<div class="card">
<h2>即時報名名單</h2>

<table>
<thead>
<tr>
<th>姓名</th>
<th>接送</th>
<th>開車</th>
<th>空位</th>
<th>家眷</th>
<th>房型</th>
</tr>
</thead>
<tbody id="dataBody">
    <tr><td colspan="6" class="loading-text">名單載入中...</td></tr>
</tbody>
</table>
</div>

</div>

<script>
// 🔥 請將下方網址替換為您在步驟一「部署」後獲得的網頁應用程式 URL
const API_URL = "填入剛才複製的網頁應用程式URL"; 

async function loadData(){
    if(API_URL === "填入剛才複製的網頁應用程式URL") return;
    
    try{
        const res = await fetch(API_URL);
        const data = await res.json();

        const body = document.getElementById("dataBody");
        body.innerHTML = "";

        if(data.length === 0){
            body.innerHTML = `<tr><td colspan="6" class="loading-text">目前尚無人報名</td></tr>`;
            return;
        }

        data.forEach(item=>{
            const row = body.insertRow();
            row.innerHTML = `
                <td>${item.name || ""}</td>
                <td>${item.transport || ""}</td>
                <td>${item.car || ""}</td>
                <td>${item.seat !== undefined ? item.seat : ""}</td>
                <td>${item.family || "無"}</td>
                <td>${item.room || ""}</td>
            `;
        });

    }catch(e){
        console.error("載入失敗", e);
        document.getElementById("dataBody").innerHTML = `<tr><td colspan="6" class="loading-text" style="color:red;">資料載入失敗，請檢查 API 設定</td></tr>`;
    }
}

// 表單送出提示與畫面重置
document.getElementById("registrationForm").addEventListener("submit", function(){
    alert("報名資料已送出！名單更新約需數秒，請稍候。");
    const form = this;
    setTimeout(() => {
        form.reset();
        loadData(); // 嘗試即時重新整理
    }, 500);
});

// 初始載入
loadData();
// 每 15 秒自動重新載入一次（避免頻率太高被 Google 限制流量）
setInterval(loadData, 15000);
</script>

</body>
</html>
